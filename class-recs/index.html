<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <link rel="stylesheet" href="style.css">
        <title>Video Gallery | Simple Viewer</title>
    </head>
    <body>

        <div class="container">
            <div class="gallery-header">
                <h1>📽️ Class Recording Gallery</h1>
            </div>

            <div class="video-grid" id="videoGrid">
                <!-- loading indicator while fetching video list -->
                <div class="empty-state" id="loadingIndicator">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="#2c5b7c" stroke-width="1.5" stroke-dasharray="4 4"/>
                        <path d="M12 4V12L16 14" stroke="#2c5b7c" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <h3>Loading videos...</h3>
                    <p>Looking for video files inside the "Videos" folder</p>
                </div>
            </div>
        </div>

    <script src="script.js"></script>
    </body>
</html>
